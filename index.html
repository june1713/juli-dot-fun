<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juli dot fun</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

               body {
            font-family: "Times New Roman", Times, serif;
            color: rgb(0, 0, 255);
            background-image: url(background3.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Creates scrollable space */
        .spacer {
            height: 200vh; /* makes page scrollable */
        }

        /* Centered fixed content */
        .overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 1);
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            width: 90%;
            text-align: center;
        }

        h1 { 
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-align: center;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
            color: rgb(255, 0, 255);
        }

                description {
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
            color: rgb(0, 0, 255);
        }

        .audio-container {
            color: rgb(255, 0, 255);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .audio-description {
            font-size: 0.95rem;
            max-width: 250px;
        }

        audio {
            max-width: 100%;
            color: rgb(255, 0, 255);
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            p {
                font-size: 1rem;
            }

            .audio-container {
                flex-direction: column;
                text-align: center;
            }

            .audio-description {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>juli dot fun</h1>

        <p>
            embrace the chaos - be gentle - trust the process
        </p>

        <div class="audio-container">
            <audio controls>
                <source src="julidotfun_01.mp3" type="audio/mpeg"> <!-- replace -->
                Your browser does not support the audio element.
            </audio>
        </div>
                <description>
(unreleased)        </description>
    </div>

        <!-- Extra space to enable scrolling -->
    <div class="spacer"></div>

</body>
</html>
